group_point:
  show_state: false
  show_name: false
  show_label: false
  show_icon: true
  color_type: icon
  size: 50%
  custom_fields:
    ring: >
      [[[
        const e = states[variables.primary_entity];
        const state = e?.state;
        const isActive = state === 'on' || state === 'open' || state === 'opening' || state === 'closing';
        if (!e || !isActive || !e.attributes.brightness) return '';
        const pct = Math.round((e.attributes.brightness || 0) / 2.54);
        const r = 18.5;
        const c = r * 2 * Math.PI;
        const off = c - (pct / 100) * c;
        const hs = e.attributes.hs_color;
        const col = hs ? 'hsl(' + hs[0] + ',' + Math.min(hs[1] + 20, 100) + '%,55%)' : 'rgb(255,170,50)';
        return '<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="' + r + '" stroke="' + col + '" stroke-width="2" fill="none" transform="rotate(-90 20 20)" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" stroke-linecap="round" opacity="0.9"/></svg>';
      ]]]
  tap_action:
    action: call-service
    service: >
      [[[
        const members = variables.members || [];
        const domains = [...new Set(members.map((id) => id.split('.')[0]))];
        const isActive = (id) => {
          const state = states[id]?.state;
          if (!state || id.startsWith('script.')) return false;
          return ['on', 'open', 'opening', 'closing'].includes(state);
        };
        const anyActive = members.some((id) => isActive(id));
        if (domains.length === 1 && domains[0] === 'cover') {
          return anyActive ? 'cover.close_cover' : 'cover.open_cover';
        }
        if (domains.length === 1 && domains[0] === 'script') {
          return 'script.turn_on';
        }
        return anyActive ? 'homeassistant.turn_off' : 'homeassistant.turn_on';
      ]]]
    service_data:
      entity_id: >
        [[[ return variables.members || []; ]]]
  hold_action:
    action: more-info
    entity: >
      [[[ return variables.group_entity || variables.primary_entity; ]]]
  double_tap_action:
    action: none
  variables:
    any_on: >
      [[[
        const isActive = (id) => {
          const state = states[id]?.state;
          if (!state) return false;
          if (id.startsWith('script.')) return false;
          return ['on', 'open', 'opening', 'closing'].includes(state);
        };
        return (variables.members || []).some((id) => isActive(id));
      ]]]
  styles:
    card:
      - width: 34px
      - height: 34px
      - padding: 0
      - border-radius: 50%
      - border: none
      - background: rgba(255, 255, 255, 0.97)
      - box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35)
      - opacity: >
          [[[ return variables.any_on ? '1' : '0.85'; ]]]
      - transition: none
      - transform: translateZ(0)
      - overflow: visible
    icon:
      - width: 50%
      - color: >
          [[[
            if (!variables.any_on) return 'rgba(60, 60, 65, 0.7)';
            const e = states[variables.primary_entity];
            if (e?.attributes?.hs_color) {
              const h = e.attributes.hs_color[0];
              const s = e.attributes.hs_color[1];
              return 'hsl(' + h + ',' + Math.min(s + 25, 100) + '%,38%)';
            }
            return 'rgb(200, 120, 20)';
          ]]]
      - transition: none
    custom_fields:
      ring:
        - position: absolute
        - top: -3px
        - left: -3px
        - width: 40px
        - height: 40px
        - pointer-events: none
