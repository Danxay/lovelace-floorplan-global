group_point:
  show_state: false
  show_name: false
  show_label: false
  show_icon: true
  color_type: icon
  size: 50%
  custom_fields:
    ring: >
      [[[
        const members = variables.members || [];
        const isActiveState = (id) => {
          const state = states[id]?.state;
          if (!state || id.startsWith('script.')) return false;
          return ['on', 'open', 'opening', 'closing'].includes(state);
        };
        const activeEntities = members
          .map((id) => states[id])
          .filter((e, idx) => e && isActiveState(members[idx]));
        const dimmableActive = activeEntities.filter((e) => e.attributes?.brightness != null);
        if (!dimmableActive.length) return '';
        const brightness = Math.max(...dimmableActive.map((e) => e.attributes.brightness || 0));
        const colorSource =
          activeEntities.find((e) => e.attributes?.hs_color) ||
          dimmableActive[0] ||
          states[variables.primary_entity];
        const pct = Math.round(brightness / 2.54);
        const r = 18.5;
        const c = r * 2 * Math.PI;
        const off = c - (pct / 100) * c;
        const hs = colorSource?.attributes?.hs_color;
        const col = hs ? 'hsl(' + hs[0] + ',' + Math.min(hs[1] + 20, 100) + '%,55%)' : 'rgb(255,170,50)';
        return '<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="' + r + '" stroke="' + col + '" stroke-width="2" fill="none" transform="rotate(-90 20 20)" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" stroke-linecap="round" opacity="0.9"/></svg>';
      ]]]
  tap_action:
    action: call-service
    service: >
      [[[
        const members = variables.members || [];
        const domains = [...new Set(members.map((id) => id.split('.')[0]))];
        const isActive = (id) => {
          const state = states[id]?.state;
          if (!state || id.startsWith('script.')) return false;
          return ['on', 'open', 'opening', 'closing'].includes(state);
        };
        const anyActive = members.some((id) => isActive(id));
        if (domains.length === 1 && domains[0] === 'cover') {
          return anyActive ? 'cover.close_cover' : 'cover.open_cover';
        }
        if (domains.length === 1 && domains[0] === 'script') {
          return 'script.turn_on';
        }
        return anyActive ? 'homeassistant.turn_off' : 'homeassistant.turn_on';
      ]]]
    service_data:
      entity_id: >
        [[[ return variables.members || []; ]]]
  hold_action:
    action: more-info
    entity: >
      [[[ return variables.group_entity || variables.primary_entity; ]]]
  double_tap_action:
    action: none
  styles:
    card:
      - width: 34px
      - height: 34px
      - padding: 0
      - border-radius: 50%
      - border: none
      - background: rgba(255, 255, 255, 0.97)
      - box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35)
      - opacity: >
          [[[
            const members = variables.members || [];
            const isActive = (id) => {
              const state = states[id]?.state;
              if (!state || id.startsWith('script.')) return false;
              return ['on', 'open', 'opening', 'closing'].includes(state);
            };
            return members.some((id) => isActive(id)) ? '1' : '0.85';
          ]]]
      - transition: none
      - transform: translateZ(0)
      - overflow: visible
    icon:
      - width: 50%
      - color: >
          [[[
            const members = variables.members || [];
            const isActive = (id) => {
              const state = states[id]?.state;
              if (!state || id.startsWith('script.')) return false;
              return ['on', 'open', 'opening', 'closing'].includes(state);
            };
            const activeEntities = members
              .map((id) => ({ id, entity: states[id] }))
              .filter(({ id, entity }) => entity && isActive(id));
            if (!activeEntities.length) return 'rgba(60, 60, 65, 0.7)';
            const colorSource =
              activeEntities.find(({ entity }) => entity.attributes?.hs_color)?.entity ||
              activeEntities.find(({ entity }) => entity.attributes?.brightness != null)?.entity ||
              states[variables.primary_entity] ||
              activeEntities[0].entity;
            if (colorSource?.attributes?.hs_color) {
              const h = colorSource.attributes.hs_color[0];
              const s = colorSource.attributes.hs_color[1];
              return 'hsl(' + h + ',' + Math.min(s + 25, 100) + '%,38%)';
            }
            return 'rgb(200, 120, 20)';
          ]]]
      - transition: none
    custom_fields:
      ring:
        - position: absolute
        - top: -3px
        - left: -3px
        - width: 40px
        - height: 40px
        - pointer-events: none
